mode: internal

data:
  excel_path: "../FIB-M2_data_pre_v2.xlsx"
  train_sheet: "train"
  test_sheet: "test"
  var_sheet: "1_variable"
  target_col: "Label"

features:
  feature_mode: "6var"
  base_exclude_cols: ["HOS"]
  features_5var: ["AGE", "AST", "ALT", "PLT", "M2BPGi"]
  features_6var: ["AGE", "AST", "ALT", "PLT", "M2BPGi", "DM_final"]
  custom_include: []

cv:
  n_splits: 5
  random_state: 42
  n_jobs: -1

search:
  search_n_iter_rf: 80
  search_n_iter_xgb: 120
  search_n_iter_lr: 50
  search_n_iter_cat: 100

thresholds:
  fixed_threshold: 0.50
  sensitivity_targets: [0.80, 0.85, 0.90, 0.95]
  specificity_targets: [0.90, 0.95, 0.98, 0.99]
  representative_threshold_policy: "youden"
  diagnostic_target_sens: 0.95
  diagnostic_target_spec: 0.90

markers:
  fib4_rule_out: 1.3
  fib4_rule_in: 2.67
  nfs_rule_out: -1.455
  nfs_rule_in: 0.676

plots:
  calibration_bins: 10
  dca_threshold_min: 0.05
  dca_threshold_max: 0.50
  dca_threshold_step: 0.01

bootstrap:
  n_bootstrap: 1000
  seed: 2026

shap:
  max_samples: 828
  lr_bg_n: 200
  group_to_original_feature: true

output:
  out_root: "./Results_modular_internal"
  run_name: null
